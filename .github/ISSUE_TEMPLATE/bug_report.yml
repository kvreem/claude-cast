name: Bug Report
description: Report a bug with claude-cast
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `/claude-cast shroud`
        2. Press `p` to pause
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.2, Ubuntu 24.04, etc.
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal app
      placeholder: iTerm2, Terminal.app, kitty, etc.
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: e.g. 1.0.0
    validations:
      required: false
